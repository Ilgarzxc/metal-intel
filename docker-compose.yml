version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: metal_backend
    ports:
      - "8000:8000"
    environment:
      DB_HOST: ${DB_HOST:-metal_postgres} # дефолт на контейнер Postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-metal_db}
      DB_USER: ${DB_USER:-metal_user}
      DB_PASS: ${DB_PASS:-password}
    restart: unless-stopped
    depends_on:
      - postgres
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"] # запуск по умолчанию

  postgres:
    image: postgres:16
    container_name: metal_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-metal_db}
      POSTGRES_USER: ${DB_USER:-metal_user}
      POSTGRES_PASSWORD: ${DB_PASS:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
